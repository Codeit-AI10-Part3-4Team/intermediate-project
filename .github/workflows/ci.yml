name: src CI (lint + test)

on:
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - '.github/workflows/ci.yml'
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - '.github/workflows/ci.yml'

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install ruff
      - name: ruff lint
        run: ruff check src tests
      - name: ruff format check
        run: ruff format --check src tests

  test:
    name: Unit tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      # core + dev 만 설치 (retrieval extra의 torch 계열은 제외하여 가볍게 유지).
      # api 목업/계약 테스트는 무거운 의존성이 필요 없다.
      - run: pip install -e ".[dev]"
      - run: pytest -v
