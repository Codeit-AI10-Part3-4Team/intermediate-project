name: src CI (lint + test)

on:
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - '.github/workflows/ci.yml'
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - '.github/workflows/ci.yml'

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'  # pyproject.toml의 3.12과 싱크 정렬

      # mypy가 core 의존성(fastapi/pydantic/pydantic-settings)의 타입을 해석하려면
      # 패키지가 설치돼 있어야 한다. retrieval extra(torch 계열)는 제외해 가볍게 유지하고,
      # 그쪽 무거운 모듈은 [tool.mypy] overrides의 ignore_missing_imports로 처리.
      - name: Install package + static analysis tools
        run: pip install -e ".[dev]"

      - name: ruff lint
        run: ruff check src tests

      - name: ruff format check
        run: ruff format --check src tests

      # 정확한 인덴트로 mypy 스텝 추가
      - name: Type check (mypy)
        run: mypy

  test:
    name: Unit tests (pytest)
    runs-on: ubuntu-latest
    # lint 작업이 성공해야만 test 작업이 실행되도록 설정 (선택 사항, 자원 절약)
    needs: lint
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'  # 파이썬 버전 통일
          cache: 'pip'
          
      # core + dev 만 설치 (retrieval extra의 torch 계열은 제외하여 가볍게 유지)
      - run: pip install -e ".[dev]"
      
      - run: pytest -v